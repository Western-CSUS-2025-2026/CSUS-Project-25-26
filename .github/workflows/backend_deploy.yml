name: Beckend build, publish and deploy docker

on:
  push:
    branches: ['main']


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: western-csus-2025-2026/csus-project-25-26_backend


jobs:
  build-and-push-image:
    name: Build and push backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space on runner
        run: |
          df -h
          docker container prune -f || true
          docker image prune -af --filter "until=168h" || true
          docker builder prune -af --filter "until=168h" || true
          docker volume prune -f || true
          if [ -d /home/deploy/actions-runner/_diag ]; then
            find /home/deploy/actions-runner/_diag -type f -name "*.log" -mtime +3 -delete || true
            ls -1t /home/deploy/actions-runner/_diag/*.log 2>/dev/null | tail -n +51 | xargs -r rm -f || true
          fi
          df -h

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=true

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./interviewer_backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}

  deploy:
    name: Deploy backend
    needs: build-and-push-image
    runs-on: [self-hosted, Linux]
    environment:
      name: production
    env:
      CONTAINER_NAME: csus_backend
    permissions:
      packages: read
      contents: read

    steps:
      - name: Free disk space on runner
        run: |
          df -h
          docker container prune -f || true
          docker image prune -af --filter "until=168h" || true
          docker builder prune -af --filter "until=168h" || true
          docker volume prune -f || true
          if [ -d /home/deploy/actions-runner/_diag ]; then
            find /home/deploy/actions-runner/_diag -type f -name "*.log" -mtime +3 -delete || true
            ls -1t /home/deploy/actions-runner/_diag/*.log 2>/dev/null | tail -n +51 | xargs -r rm -f || true
          fi
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest backend image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest 

      - name: Run DB migrations
        run: |
          docker network create web || true

          docker run \
            --rm \
            --network=web \
            --env DB_DSN='${{ secrets.DB_DSN }}' \
            --name ${{ env.CONTAINER_NAME }}_migration \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest  \
            alembic upgrade head

      - name: Run backend container
        run: |
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true

          docker run \
            --detach \
            --restart on-failure:3 \
            --network=web \
            --log-opt max-size=10m \
            --log-opt max-file=5 \
            --env DB_DSN='${{ secrets.DB_DSN }}' \
            --env EMAIL='${{ vars.EMAIL || '' }}' \
            --env EMAIL_PASS='${{ secrets.EMAIL_PASS }}' \
            --env TWELVE_LABS_API_KEYS='${{ secrets.TWELVE_LABS_API_KEYS }}' \
            --env TWELVE_LABS_WEBHOOK_SECRET='${{ secrets.TWELVE_LABS_WEBHOOK_SECRET }}' \
            --env JWT_SECRET='${{ secrets.JWT_SECRET }}' \
            --env JWT_ALGORITHM="${{ vars.JWT_ALGORITHM || 'HS256' }}" \
            --env ACCESS_TOKEN_TTL_MINUTES="${{ vars.ACCESS_TOKEN_TTL_MINUTES || '15' }}" \
            --env REFRESH_TOKEN_TTL_DAYS="${{ vars.REFRESH_TOKEN_TTL_DAYS || '7' }}" \
            --env REFRESH_TOKEN_LENGTH="${{ vars.REFRESH_TOKEN_LENGTH || '64' }}" \
            --env AUTH_COOKIE_SECURE="${{ vars.AUTH_COOKIE_SECURE || 'true' }}" \
            --env AUTH_COOKIE_SAMESITE="${{ vars.AUTH_COOKIE_SAMESITE || 'lax' }}" \
            --env AUTH_COOKIE_DOMAIN="${{ vars.AUTH_COOKIE_DOMAIN || '' }}" \
            --env AUTH_COOKIE_PATH="${{ vars.AUTH_COOKIE_PATH || '/' }}" \
            --env REFRESH_COOKIE_PATH="${{ vars.REFRESH_COOKIE_PATH || '/user' }}" \
            --env CORS_ALLOW_ORIGIN_REGEX="${{ vars.CORS_ALLOW_ORIGIN_REGEX || '' }}" \
            --env FORWARDED_ALLOW_IPS="${{ vars.FORWARDED_ALLOW_IPS || '*' }}" \
            --env WEB_CONCURRENCY="${{ vars.WEB_CONCURRENCY || '1' }}" \
            --env DB_POOL_SIZE="${{ vars.DB_POOL_SIZE || '5' }}" \
            --env DB_POOL_MAX_OVERFLOW="${{ vars.DB_POOL_MAX_OVERFLOW || '5' }}" \
            --env DB_POOL_TIMEOUT_SECONDS="${{ vars.DB_POOL_TIMEOUT_SECONDS || '10' }}" \
            --env DB_POOL_RECYCLE_SECONDS="${{ vars.DB_POOL_RECYCLE_SECONDS || '1800' }}" \
            --env METRICS_ENABLED="${{ vars.METRICS_ENABLED || 'true' }}" \
            --env AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_ACCESS_KEY }}' \
            --env AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY_ID }}' \
            --env AWS_REGION='${{ vars.AWS_REGION }}' \
            --env S3_BUCKET_NAME='${{ vars.S3_BUCKET_NAME }}' \
            --env VIDEO_UPLOAD_LIMIT_ENABLED='${{ vars.VIDEO_UPLOAD_LIMIT_ENABLED }}' \
            --env VIDEO_UPLOAD_LIMIT_MONTHLY='${{ vars.VIDEO_UPLOAD_LIMIT_MONTHLY }}' \
            --env VIDEO_UPLOAD_LIMIT='${{ vars.VIDEO_UPLOAD_LIMIT }}' \
            --env ROOT_PATH='' \
            --label logging='promtail' \
            --label job='interviewer_backend' \
            --name ${{ env.CONTAINER_NAME }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Run Prometheus container
        run: |
          docker stop interviewer_prometheus || true
          docker rm interviewer_prometheus || true

          docker run \
            --detach \
            --restart unless-stopped \
            --network=web \
            --log-opt max-size=10m \
            --log-opt max-file=5 \
            --publish 9090:9090 \
            --volume "${GITHUB_WORKSPACE}/interviewer_backend/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro" \
            --volume interviewer_prometheus_data:/prometheus \
            --name interviewer_prometheus \
            prom/prometheus:latest \
            --config.file=/etc/prometheus/prometheus.yml \
            --storage.tsdb.path=/prometheus \
            --web.enable-lifecycle

      - name: Run Loki container
        run: |
          docker stop interviewer_loki || true
          docker rm interviewer_loki || true

          docker run \
            --detach \
            --restart unless-stopped \
            --network=web \
            --log-opt max-size=10m \
            --log-opt max-file=5 \
            --publish 3100:3100 \
            --volume "${GITHUB_WORKSPACE}/interviewer_backend/observability/loki/loki-config.yml:/etc/loki/config.yml:ro" \
            --volume interviewer_loki_data:/loki \
            --name interviewer_loki \
            grafana/loki:2.9.8 \
            -config.file=/etc/loki/config.yml

      - name: Run Promtail container
        run: |
          docker stop interviewer_promtail || true
          docker rm interviewer_promtail || true

          docker run \
            --detach \
            --restart unless-stopped \
            --network=web \
            --log-opt max-size=10m \
            --log-opt max-file=5 \
            --volume "${GITHUB_WORKSPACE}/interviewer_backend/observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro" \
            --volume /var/log:/var/log:ro \
            --volume /var/lib/docker/containers:/var/lib/docker/containers:ro \
            --volume /var/run/docker.sock:/var/run/docker.sock:ro \
            --name interviewer_promtail \
            grafana/promtail:3.6.7 \
            -config.file=/etc/promtail/config.yml

      - name: Run Grafana container
        run: |
          docker stop interviewer_grafana || true
          docker rm interviewer_grafana || true

          docker run \
            --detach \
            --restart unless-stopped \
            --network=web \
            --log-opt max-size=10m \
            --log-opt max-file=5 \
            --env GF_SECURITY_ADMIN_USER='admin' \
            --env GF_SECURITY_ADMIN_PASSWORD='${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}' \
            --env GF_USERS_ALLOW_SIGN_UP='false' \
            --env GF_METRICS_ENABLED='false' \
            --env GF_SERVER_ROOT_URL='${{ vars.GRAFANA_ROOT_URL || 'https://api.jobless.live/grafana/' }}' \
            --env GF_SERVER_SERVE_FROM_SUB_PATH='true' \
            --volume "${GITHUB_WORKSPACE}/interviewer_backend/observability/grafana/provisioning/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro" \
            --volume "${GITHUB_WORKSPACE}/interviewer_backend/observability/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro" \
            --volume "${GITHUB_WORKSPACE}/interviewer_backend/observability/grafana/dashboards:/etc/grafana/dashboards:ro" \
            --volume interviewer_grafana_data:/var/lib/grafana \
            --name interviewer_grafana \
            grafana/grafana:latest
