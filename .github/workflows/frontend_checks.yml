name: Frontend CI Precheck

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: interviewer_frontend

    steps:
      - name: checkout repo
        uses: actions/checkout@v3
      - name: set up node
        uses: actions/setup-node@v3
        with:
          node-version: "22"
      - name: install dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint
      - name: Run Build
        run: npm run build
      - name: Prettier Precheck
        run: |
          set +e
          npm run format-precheck 
          exit_code=$?

          if [ $exit_code -eq 2 ]; then
            exit 2
          elif [ $exit_code -eq 1 ]; then
            exit 0
          fi

          exit 0
